name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Rust build
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: |
          cp target/release/surge-enhancer surge-enhancer-rust-macos-arm64
          chmod +x surge-enhancer-rust-macos-arm64

      # Zig build
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: brew install libyaml pcre2
      - run: zig build -Doptimize=ReleaseFast
        working-directory: zig
      - run: |
          cp zig/zig-out/bin/surge-enhancer surge-enhancer-zig-macos-arm64
          chmod +x surge-enhancer-zig-macos-arm64

      # Create release
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            surge-enhancer-rust-macos-arm64
            surge-enhancer-zig-macos-arm64
            config.example.yaml
